version: '3.8'
services:
  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    ports:
      - '3333:3333'
    environment:
      MONGODB_URI: mongodb://mongodb:27017/catbakery
      PORT: '3333'
    depends_on:
      - mongodb

volumes:
  mongo-data:
